apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expense-frontend
  template:
    metadata:
      labels:
        app: expense-frontend
    spec:
      containers:
        - name: frontend
          image: kushagrashri/expense-frontend:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 80
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: expense-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30008